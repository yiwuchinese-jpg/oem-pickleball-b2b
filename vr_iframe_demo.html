<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR 展厅演示</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #09090b; /* 匹配你网站的深色背景 */
        }
        
        .vr-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .vr-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 底部实色遮罩条 */
        .mask-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: #09090b; /* 完全使用你网站的底色遮挡 */
            z-index: 10;
            pointer-events: auto; /* 拦截点击事件 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* 左上角品牌覆盖 */
        .mask-top-left {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 160px;
            height: 40px;
            background-color: rgba(9, 9, 11, 0.9);
            border-radius: 8px;
            z-index: 10;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(57, 255, 20, 0.2); /* 网站的 Neon 边框 */
        }

        /* 匹配你网站的 Neon 按钮风格 */
        .my-custom-btn {
            padding: 14px 32px;
            background-color: #39FF14; /* 你的网站主题色：Neon Green */
            color: #000000;
            border-radius: 9999px; /* 圆角按钮 */
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            transition: all 0.3s ease;
            border: none;
        }
        
        .my-custom-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="vr-container">
    <!-- 嵌入 1688 VR 页面，增加 sandbox 和 referrerpolicy 防止跨域拦截 -->
    <iframe 
        class="vr-iframe" 
        src="https://air.1688.com/pages/vr_viewer/vr_hall/dq193oei7/index.html?__pageId__=1247378&wh_pid=1247378&wvUseWKWebView=true&__existtitle__=1&xrBizCode=pmAuthentication&previewToken=c4222f843c8744fc8bd69f8accdff72f&sellerLoginId=lidu363636888" 
        allowfullscreen
        allow="autoplay; fullscreen; xr-spatial-tracking"
        referrerpolicy="no-referrer">
    </iframe>
    
    <!-- 左上角覆盖为你的品牌 -->
    <div class="mask-top-left">DJW Pickleball</div>

    <!-- 底部栏完全覆盖 -->
    <div class="mask-bottom-bar">
        <!-- 替换成你网站的 Neon 风格按钮 -->
        <div class="my-custom-btn" onclick="alert('Contact form will open here!')">
            Contact OEM Factory
        </div>
    </div>
</div>

</body>
</html>
